<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Fare Tally</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root{
    --bg: var(--tg-theme-bg-color, #0E1621);
    --surface: var(--tg-theme-secondary-bg-color, #17212B);
    --text: var(--tg-theme-text-color, #F0F3F5);
    --hint: var(--tg-theme-hint-color, #7C8A97);
    --accent: #FFB020;
    --accent-ink: #1A1200;
    --stroke: rgba(255,255,255,0.08);
    --radius: 14px;
  }

  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  html,body{
    margin:0; padding:0; height:100%;
    background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    overscroll-behavior-y:contain;
  }

  .num{
    font-family:"SFMono-Regular",Consolas,"Liberation Mono",Menlo,monospace;
    font-variant-numeric: tabular-nums;
  }

  header{
    padding:20px 18px 12px;
    position:sticky; top:0; z-index:5;
    background:linear-gradient(var(--bg) 80%, transparent);
  }
  header h1{
    margin:0; font-size:22px; font-weight:800; letter-spacing:-0.02em;
  }
  header p{
    margin:4px 0 0; font-size:13px; color:var(--hint);
  }

  main{
    padding:4px 14px 190px;
  }

  .row{
    display:flex; align-items:center; gap:12px;
    background:var(--surface);
    border:1px solid var(--stroke);
    border-radius:var(--radius);
    padding:12px 14px;
    margin-bottom:8px;
    transition: border-color .15s ease, background .15s ease;
  }
  .row.active{
    border-color: color-mix(in srgb, var(--accent) 45%, var(--stroke));
    background: linear-gradient(0deg, color-mix(in srgb, var(--accent) 6%, var(--surface)), color-mix(in srgb, var(--accent) 6%, var(--surface)));
  }

  .row-idx{
    font-size:11px; color:var(--hint); width:16px; flex:none;
    text-align:right;
  }

  .row-info{ flex:1; min-width:0; }
  .row-name{
    font-size:14.5px; font-weight:600; line-height:1.25;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .row-fare{
    font-size:12px; color:var(--hint); margin-top:2px;
  }

  .stepper{
    display:flex; align-items:center; gap:0;
    background:rgba(255,255,255,0.05);
    border-radius:10px;
    flex:none;
  }
  .stepper button{
    width:32px; height:32px;
    border:none; background:transparent; color:var(--text);
    font-size:18px; font-weight:600;
    cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    -webkit-user-select:none; user-select:none;
  }
  .stepper button:active{ transform:scale(0.9); }
  .stepper button.minus{ color:var(--hint); }
  .stepper .count{
    width:26px; text-align:center; font-size:15px; font-weight:700;
  }

  .row-sub{
    width:58px; text-align:right; flex:none;
    font-size:14px; font-weight:700; color:var(--hint);
  }
  .row.active .row-sub{ color:var(--accent); }

  footer{
    position:fixed; left:0; right:0; bottom:0; z-index:10;
  }
  .perf{
    height:14px;
    background:
      radial-gradient(circle 7px at 0 7px, transparent 98%, transparent) ,
      var(--bg);
    -webkit-mask: radial-gradient(circle 7px at center, transparent 7px, black 7.5px) repeat-x;
    mask: radial-gradient(circle 7px at center, transparent 7px, black 7.5px) repeat-x;
    -webkit-mask-size: 24px 100%;
    mask-size: 24px 100%;
    background-color: var(--accent);
  }
  .total-bar{
    background:var(--accent);
    color:var(--accent-ink);
    padding:14px 18px calc(16px + env(safe-area-inset-bottom));
    display:flex; align-items:center; justify-content:space-between;
    box-shadow: 0 -6px 24px rgba(0,0,0,0.35);
  }
  .total-left .tl-label{
    font-size:11px; text-transform:uppercase; letter-spacing:.06em;
    font-weight:700; opacity:.7;
  }
  .total-left .tl-amount{
    font-size:28px; font-weight:800; line-height:1.1; margin-top:1px;
  }
  .total-right{
    display:flex; align-items:center; gap:10px;
  }
  .trip-pill{
    font-size:12px; font-weight:700;
    background:rgba(0,0,0,0.12);
    padding:6px 10px; border-radius:999px;
  }
  .reset-btn{
    border:none; background:rgba(0,0,0,0.15);
    color:var(--accent-ink);
    width:36px; height:36px; border-radius:10px;
    font-size:15px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
  }
  .reset-btn:active{ transform:scale(0.92); }

  .empty-hint{
    text-align:center; color:var(--hint); font-size:12px;
    padding:10px 0 4px;
  }
</style>
</head>
<body>

<header>
  <h1>Fare Tally</h1>
  <p>Tap + on each ride you've taken. Total updates as you go.</p>
</header>

<main id="list"></main>

<footer>
  <div class="perf"></div>
  <div class="total-bar">
    <div class="total-left">
      <div class="tl-label">Total fare</div>
      <div class="tl-amount num" id="totalAmount">$0.00</div>
    </div>
    <div class="total-right">
      <div class="trip-pill num" id="tripCount">0 rides</div>
      <button class="reset-btn" id="resetBtn" title="Reset all" aria-label="Reset all">↺</button>
    </div>
  </div>
</footer>

<script>
(function(){
  var tg = window.Telegram && window.Telegram.WebApp;
  if (tg) { try { tg.ready(); tg.expand(); } catch(e){} }

  var routes = [
    { name:"Bishan → NEX", fare:1.28 },
    { name:"Bishan → HarbourFront", fare:1.82 },
    { name:"HarbourFront → Redhill", fare:1.49 },
    { name:"HarbourFront → Tiong Bahru", fare:1.59 },
    { name:"HarbourFront → Jurong East", fare:1.75 },
    { name:"Jurong East → Bishan", fare:2.15 },
    { name:"Bishan → Tampines", fare:2.07 },
    { name:"Tampines → Redhill", fare:2.27 },
    { name:"Redhill → Bishan", fare:1.90 },
    { name:"Redhill → Bugis", fare:1.68 },
    { name:"Bugis → Bishan", fare:1.75 },
    { name:"Bishan → Farrer Park", fare:1.68 },
    { name:"Farrer Park → NEX", fare:1.49 },
    { name:"Bishan → Pasir Ris", fare:2.15 },
    { name:"Pasir Ris → Redhill", fare:2.33 },
    { name:"Bishan → Tiong Bahru", fare:1.86 },
    { name:"Bishan → Buangkok", fare:1.68 }
  ];

  var STORAGE_KEY = "fareTallyCounts";
  var counts = [];
  try {
    var saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
    counts = routes.map(function(_, i){ return saved[i] || 0; });
  } catch(e) {
    counts = routes.map(function(){ return 0; });
  }

  var listEl = document.getElementById("list");
  var totalEl = document.getElementById("totalAmount");
  var tripEl = document.getElementById("tripCount");
  var resetBtn = document.getElementById("resetBtn");

  function money(n){ return "$" + n.toFixed(2); }

  function haptic(style){
    if (tg && tg.HapticFeedback) {
      try { tg.HapticFeedback.impactOccurred(style || "light"); } catch(e){}
    }
  }

  function persist(){
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(counts)); } catch(e){}
  }

  function render(){
    var frag = document.createDocumentFragment();
    routes.forEach(function(r, i){
      var c = counts[i];
      var row = document.createElement("div");
      row.className = "row" + (c > 0 ? " active" : "");

      row.innerHTML =
        '<div class="row-idx">' + (i + 1) + '</div>' +
        '<div class="row-info">' +
          '<div class="row-name">' + r.name + '</div>' +
          '<div class="row-fare num">' + money(r.fare) + ' / ride</div>' +
        '</div>' +
        '<div class="stepper">' +
          '<button class="minus" data-i="' + i + '" data-d="-1">−</button>' +
          '<div class="count num">' + c + '</div>' +
          '<button class="plus" data-i="' + i + '" data-d="1">+</button>' +
        '</div>' +
        '<div class="row-sub num">' + money(r.fare * c) + '</div>';

      frag.appendChild(row);
    });
    listEl.innerHTML = "";
    listEl.appendChild(frag);
    updateTotal();
  }

  function updateTotal(){
    var total = 0, trips = 0;
    routes.forEach(function(r, i){
      total += r.fare * counts[i];
      trips += counts[i];
    });
    totalEl.textContent = money(total);
    tripEl.textContent = trips + (trips === 1 ? " ride" : " rides");
  }

  listEl.addEventListener("click", function(ev){
    var btn = ev.target.closest("button[data-i]");
    if (!btn) return;
    var i = parseInt(btn.getAttribute("data-i"), 10);
    var d = parseInt(btn.getAttribute("data-d"), 10);
    var next = counts[i] + d;
    if (next < 0) next = 0;
    if (next === counts[i]) return;
    counts[i] = next;
    persist();
    haptic("light");
    render();
  });

  resetBtn.addEventListener("click", function(){
    if (counts.every(function(c){ return c === 0; })) return;
    counts = routes.map(function(){ return 0; });
    persist();
    haptic("medium");
    render();
  });

  render();
})();
</script>

</body>
</html>
